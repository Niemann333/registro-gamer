<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chiptune Player - Registro Gamer</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden}
body{display:flex;flex-direction:column;font-family:'VT323',monospace;color:#00ff00}
.stripe{height:3px;background:linear-gradient(90deg,#ff4444,#ff8800,#ffff00,#00ff00,#00ffff,#8844ff);flex-shrink:0}
.viz-wrap{height:60px;background:#050505;flex-shrink:0;position:relative;overflow:hidden}
#canvas{width:100%;height:100%;display:block}
.scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);pointer-events:none}
.screen{background:#050a05;padding:8px 12px 6px;flex-shrink:0;border-bottom:1px solid #111}
.now{font-size:10px;color:#2a2a2a;letter-spacing:2px;margin-bottom:2px}
.title{font-size:20px;color:#00ff00;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 8px rgba(0,255,0,0.4)}
.game{font-size:14px;color:#004400;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row2{display:flex;justify-content:space-between;margin-top:4px}
.fmt{font-size:12px;background:#001500;border:1px solid #003300;color:#006600;padding:1px 6px;border-radius:2px;letter-spacing:2px}
.time{font-size:18px;color:#004400;letter-spacing:2px}
.prog{height:3px;background:#0a0a0a;cursor:pointer;flex-shrink:0}
.prog-fill{height:100%;background:#00cc00;width:0%;box-shadow:0 0 4px #00cc00}
.controls{display:flex;align-items:center;padding:5px 8px;gap:3px;border-bottom:1px solid #111;background:#060606;flex-shrink:0}
.btn{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:3px;cursor:pointer;color:#333;font-size:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:'VT323',monospace;transition:all .1s}
.btn:hover{border-color:#00cc00;color:#00cc00;background:#001a00}
.btn.on{border-color:#00cc00;color:#00cc00;background:#001a00}
#play{width:38px;height:38px;background:#001a00;border-color:#00cc00;color:#00cc00;font-size:20px}
#play.playing{background:#1a1200;border-color:#ccaa00;color:#ccaa00}
.vol{display:flex;align-items:center;gap:4px;margin-left:auto}
.vol-lbl{font-size:12px;color:#2a2a2a}
.vol-track{width:45px;height:3px;background:#0f0f0f;border-radius:2px;cursor:pointer}
.vol-fill{height:100%;background:#004400;width:80%;border-radius:2px}
.list{flex:1;overflow-y:auto;background:#060606;min-height:0}
.list::-webkit-scrollbar{width:2px}
.list::-webkit-scrollbar-thumb{background:#1a1a1a}
.item{display:flex;align-items:center;gap:6px;padding:6px 12px;cursor:pointer;border-bottom:1px solid #0a0a0a}
.item:hover{background:#0a0f0a}
.item.on{background:#050f05}
.item.on .dot{background:#00cc00;box-shadow:0 0 4px #00cc00}
.dot{width:4px;height:4px;border-radius:50%;background:#1a1a1a;flex-shrink:0}
.iinfo{flex:1;min-width:0}
.iname{font-size:15px;color:#2a2a2a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item.on .iname{color:#00cc00}
.isub{font-size:12px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ifmt{font-size:11px;color:#1a1a1a;flex-shrink:0}
.item.on .ifmt{color:#003300}
.footer{display:flex;justify-content:space-between;padding:4px 12px;background:#040404;flex-shrink:0}
.ftxt{font-size:12px;color:#1a1a1a;letter-spacing:2px}
.ftxt span{color:#2a2a2a}
.debug{font-size:13px;color:#00cc00;padding:4px 12px;background:#020402;border-top:1px solid #0a1a0a;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="stripe"></div>
<div class="viz-wrap"><canvas id="canvas"></canvas><div class="scanlines"></div></div>
<div class="screen">
  <div class="now">▶ NOW PLAYING</div>
  <div class="title" id="title">REGISTRO GAMER</div>
  <div class="game" id="game">carregando emulador...</div>
  <div class="row2">
    <span class="fmt" id="fmt">–</span>
    <span class="time" id="time">0:00</span>
  </div>
</div>
<div class="prog" id="prog"><div class="prog-fill" id="pfill"></div></div>
<div class="controls">
  <button class="btn" id="prev">&#9664;&#9664;</button>
  <button class="btn" id="play">&#9654;</button>
  <button class="btn" id="next">&#9654;&#9654;</button>
  <button class="btn" id="loop">&#8635;</button>
  <button class="btn" id="shuf">&#10006;</button>
  <div class="vol">
    <span class="vol-lbl">VOL</span>
    <div class="vol-track" id="voltrack"><div class="vol-fill" id="volfill"></div></div>
  </div>
</div>
<div class="list" id="list"></div>
<div class="debug" id="debug">...</div>
<div class="footer">
  <span class="ftxt">CHIPTUNE <span id="status">INIT</span></span>
  <span class="ftxt">RG-AUDIO</span>
</div>

<!-- div oculto para o React montar -->
<div id="root" style="display:none;position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden"></div>

<!-- Carrega o main.js do MESMO domínio — sem CORS! -->
<script>
// ============================================================
// PLAYLIST
// ============================================================
var BASE = 'https://raw.githubusercontent.com/Niemann333/registro-gamer/main/Chiptunes/Chiptunes%20de%20Games/';
var PLAYLIST = [
  {title:'Cammy Stage I', game:'Super Street Fighter II', fmt:'VGZ',
   pasta:'Arcade%20(VGM)/Super%20Street%20Fighter%20II%20-%20The%20New%20Challengers/',
   file:'29%20Cammy%20Stage%20I.vgz'},
  // {title:'Nome', game:'Jogo', fmt:'VGM', pasta:'PASTA/', file:'ARQUIVO.vgm'},
];
// ============================================================

function fileUrl(t){ return BASE + t.pasta + t.file; }

var cur=0, playing=false, looping=false, shuffling=false, vol=0.8;
var sequencer=null;
var elapsed=0, timerInterval=null;
var canvas=document.getElementById('canvas');
var cx=canvas.getContext('2d');
var vizPhase=0;

function dbg(m){ document.getElementById('debug').textContent='> '+m; console.log('[CP]',m); }
function setStatus(t){ document.getElementById('status').textContent=t; }

function vizLoop(){
  requestAnimationFrame(vizLoop);
  var w=canvas.offsetWidth,h=canvas.offsetHeight;
  if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}
  cx.clearRect(0,0,w,h);
  if(!playing){
    cx.strokeStyle='#111';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(0,h/2);cx.lineTo(w,h/2);cx.stroke();
    return;
  }
  vizPhase+=0.06;
  var n=32,bw=w/n;
  for(var i=0;i<n;i++){
    var v=Math.abs(Math.sin(vizPhase+i*0.4))*0.6+Math.random()*0.3;
    cx.fillStyle='rgba(0,'+(80+Math.round(v*175))+',0,'+(0.4+v*0.6)+')';
    cx.fillRect(i*bw+.5,h-v*h,bw-1,v*h);
  }
}

// Carrega o main.js do mesmo domínio — sem CORS!
function initSequencer(cb){
  if(sequencer){ cb(); return; }
  dbg('Carregando main.js (mesmo dominio)...');

  var s = document.createElement('script');
  // main.0a47.js está na raiz do repositório = raiz do GitHub Pages
  s.src = '/registro-gamer/static/js/main.0a47.js';
  s.onload = function(){
    dbg('main.js carregado! Aguardando ChipPlayer...');
    var tries=0;
    function check(){
      if(window.ChipPlayer && window.ChipPlayer.sequencer){
        sequencer = window.ChipPlayer.sequencer;
        dbg('ChipPlayer pronto!');
        setStatus('READY');
        document.getElementById('game').textContent='Selecione uma faixa';
        cb();
      } else if(tries++ < 150){
        setTimeout(check,200);
        if(tries===5) dbg('Inicializando chip-core.wasm...');
      } else {
        dbg('Timeout — verifique o console');
        setStatus('ERR');
      }
    }
    setTimeout(check, 1000);
  };
  s.onerror = function(){
    dbg('ERRO: main.js nao encontrado em /registro-gamer/');
    setStatus('ERR');
  };
  document.head.appendChild(s);
}

function playTrack(idx){
  var t=PLAYLIST[idx]; if(!t) return;
  cur=idx; buildList();
  document.getElementById('title').textContent=t.title;
  document.getElementById('game').textContent=t.game||'';
  document.getElementById('fmt').textContent=t.fmt||'–';
  elapsed=0; setStatus('LOAD');

  initSequencer(function(){
    var url=fileUrl(t);
    dbg('Tocando: '+t.title);
    try{
      sequencer.playSonglist([url]);
      playing=true; setStatus('PLAY'); updPlay(); startTimer();
    }catch(e){
      dbg('Erro: '+e.message); setStatus('ERR');
    }
  });
}

function togglePlay(){
  if(!sequencer){ playTrack(cur); return; }
  try{ sequencer.togglePause(); }catch(e){}
  playing=!playing;
  if(playing){ setStatus('PLAY'); startTimer(); }
  else{ setStatus('PAUSE'); clearInterval(timerInterval); }
  updPlay();
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    if(!playing)return;
    elapsed++;
    document.getElementById('time').textContent=Math.floor(elapsed/60)+':'+(elapsed%60<10?'0':'')+elapsed%60;
  },1000);
}

function updPlay(){
  var b=document.getElementById('play');
  b.innerHTML=playing?'&#9646;&#9646;':'&#9654;';
  b.classList.toggle('playing',playing);
}

function buildList(){
  var l=document.getElementById('list');l.innerHTML='';
  PLAYLIST.forEach(function(t,i){
    var d=document.createElement('div');
    d.className='item'+(i===cur?' on':'');
    d.innerHTML='<div class="dot"></div><div class="iinfo"><div class="iname">'+t.title+'</div>'+(t.game?'<div class="isub">'+t.game+'</div>':'')+'</div><span class="ifmt">'+(t.fmt||'')+'</span>';
    (function(idx){d.addEventListener('click',function(){elapsed=0;playTrack(idx);});})(i);
    l.appendChild(d);
  });
}

document.getElementById('play').addEventListener('click',togglePlay);
document.getElementById('prev').addEventListener('click',function(){elapsed=0;playTrack(cur>0?cur-1:PLAYLIST.length-1);});
document.getElementById('next').addEventListener('click',function(){elapsed=0;playTrack(cur<PLAYLIST.length-1?cur+1:0);});
document.getElementById('loop').addEventListener('click',function(){looping=!looping;this.classList.toggle('on',looping);});
document.getElementById('shuf').addEventListener('click',function(){shuffling=!shuffling;this.classList.toggle('on',shuffling);this.innerHTML=shuffling?'&#9861;':'&#10006;';});
document.getElementById('voltrack').addEventListener('click',function(e){
  vol=Math.max(0,Math.min(1,e.offsetX/this.offsetWidth));
  document.getElementById('volfill').style.width=(vol*100)+'%';
  if(window.ChipPlayer&&window.ChipPlayer.gainNode)
    window.ChipPlayer.gainNode.gain.value=vol;
});

buildList();
vizLoop();
</script>
</body>
</html>
