<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Registro Gamer"/>
<meta name="theme-color" content="#0D0D1A"/>
<title>Registro Gamer</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D1A;color:#eee;font-family:Oxanium,sans-serif;min-height:100vh;padding-bottom:64px}
::-webkit-scrollbar{display:none}
#header{position:sticky;top:0;z-index:10;background:#0D0D1A;padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.07)}
.hrow{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#9B59FF,#4DA6FF);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.htitle{font-size:16px;font-weight:800}
.hsub{font-size:9px;color:rgba(155,89,255,0.85);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px}
.chips{display:flex;gap:7px;overflow-x:auto;padding:10px 0 2px}
.chip{flex-shrink:0;padding:6px 12px;border-radius:99px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:Oxanium,sans-serif;white-space:nowrap;outline:none;font-weight:500}
.chip.on{font-weight:700}
.cn{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);border-radius:99px;padding:1px 5px;font-size:9px;font-weight:700;min-width:16px;text-align:center}
#shelf-filters{display:none}
.page{display:none;padding:12px 16px 32px}
.page.show{display:block}
/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,26,0.97);border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:20}
.nb{flex:1;padding:8px 0 12px;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;color:rgba(255,255,255,0.35);font-family:Oxanium,sans-serif;font-size:8px;font-weight:600;letter-spacing:0.4px;cursor:pointer;outline:none}
.nb.on{color:#9B59FF}
.ni{font-size:18px;line-height:1}
.nd{width:3px;height:3px;border-radius:50%;background:#9B59FF;opacity:0}
.nb.on .nd{opacity:1}
/* BLOG LIST */
.bcard{display:flex;gap:11px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;user-select:none}
.bcard:last-child{border-bottom:none}
.bthumb{width:76px;height:76px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,0.1)}
.bthumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.binfo{flex:1;min-width:0;pointer-events:none}
.bdate{font-size:8px;color:rgba(155,89,255,0.8);letter-spacing:0.9px;text-transform:uppercase;margin-bottom:4px}
.btitle{font-size:12px;font-weight:700;line-height:1.3;color:#eee;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.bex{font-size:10px;color:rgba(255,255,255,0.4);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.barr{color:rgba(255,255,255,0.2);font-size:15px;align-self:center;flex-shrink:0;pointer-events:none}
/* PAGINATION */
.pgbar{display:flex;justify-content:center;align-items:center;gap:7px;margin-top:20px}
.pb{width:38px;height:38px;border-radius:9px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pb.on{background:linear-gradient(135deg,rgba(155,89,255,.3),rgba(77,166,255,.2));border-color:rgba(155,89,255,.6);color:#fff;font-weight:700}
.pb.nav{background:rgba(155,89,255,.12);color:#9B59FF;font-size:18px}
.pb.nav:disabled{background:rgba(255,255,255,.03);color:rgba(255,255,255,.15);cursor:default}
/* POST READER */
#post-view{position:fixed;inset:0;z-index:50;background:#0D0D1A;overflow-y:auto;display:none;padding-bottom:40px}
#post-view.show{display:block}
#post-hdr{position:sticky;top:0;background:#0D0D1A;border-bottom:1px solid rgba(255,255,255,0.07);padding:12px 16px;display:flex;align-items:center;gap:12px}
#post-back{background:rgba(255,255,255,0.07);border:none;border-radius:8px;padding:7px 12px;color:#eee;font-family:Oxanium,sans-serif;font-size:12px;cursor:pointer;white-space:nowrap}
#post-ttl{font-size:13px;font-weight:700;flex:1;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
#post-date{padding:12px 16px 4px;font-size:9px;color:rgba(155,89,255,0.8);letter-spacing:1px;text-transform:uppercase}
#post-body{padding:8px 16px 24px;font-size:14px;line-height:1.75;color:rgba(255,255,255,0.85)}
#post-body img{max-width:100%;height:auto;border-radius:8px;margin:10px 0;display:block}
#post-body a{color:#9B59FF}
#post-body p,#post-body div{margin-bottom:10px;max-width:100%}
#post-body h1,#post-body h2,#post-body h3{color:#fff;margin:16px 0 8px}
#post-body iframe{max-width:100%;border-radius:8px;margin:10px 0;display:block}
#post-body .separator{text-align:center!important}
#post-body span{font-size:inherit!important}
/* ARCHIVE */
.arch-year{margin-bottom:8px;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)}
.arch-year-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none}
.arch-year-title{font-size:14px;font-weight:800;color:#fff}
.arch-year-cnt{font-size:10px;color:rgba(155,89,255,0.8);font-weight:600}
.arch-year-arrow{font-size:12px;color:rgba(255,255,255,0.3);transition:transform 0.2s}
.arch-year-body{display:none;border-top:1px solid rgba(255,255,255,0.07)}
.arch-year-body.open{display:block}
.arch-month{border-bottom:1px solid rgba(255,255,255,0.05)}
.arch-month:last-child{border-bottom:none}
.arch-month-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none}
.arch-month-name{font-size:12px;font-weight:700;color:rgba(255,255,255,0.7)}
.arch-month-cnt{font-size:10px;color:rgba(255,255,255,0.3)}
.arch-month-body{display:none;background:rgba(0,0,0,0.2)}
.arch-month-body.open{display:block}
.arch-post{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04)}
.arch-post:last-child{border-bottom:none}
.arch-post:active{background:rgba(255,255,255,0.04)}
.arch-post-title{font-size:12px;color:rgba(255,255,255,0.8);flex:1;line-height:1.3}
.arch-post-arrow{color:rgba(255,255,255,0.2);font-size:13px;flex-shrink:0}
/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.tag-btn{padding:7px 14px;border-radius:99px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.65);font-size:11px;cursor:pointer;font-family:Oxanium,sans-serif;outline:none;transition:all 0.15s}
.tag-btn:active,.tag-btn.on{border-color:#9B59FF;color:#9B59FF;background:rgba(155,89,255,0.1)}
.tag-section{margin-bottom:20px}
.tag-section-title{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px}
/* SHELF */
#grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
#rbar{display:none;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:10px;color:rgba(255,255,255,0.35)}
.card{border-radius:14px;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);animation:fu .3s ease both}
.cbar{display:flex;height:3px}.cbar span{flex:1}
.cimg{aspect-ratio:3/4;overflow:hidden;background:#111;position:relative}
.cimg img{width:100%;height:100%;object-fit:cover;display:block}
.cnoi{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e);font-size:26px;color:rgba(255,255,255,0.1)}
.cov{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,26,.95) 0%,rgba(13,13,26,.2) 60%,transparent)}
.cinfo{padding:8px 9px 10px}
.ctitle{font-size:11px;font-weight:700;line-height:1.3;color:#eee;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cplat{margin-top:4px;font-size:8px;font-weight:600;color:rgba(155,89,255,.9);letter-spacing:.7px;text-transform:uppercase}
.ctags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.ctag{font-size:8px;padding:2px 5px;border-radius:20px;font-weight:700}
#smsg{display:none;margin-top:40px;text-align:center;color:rgba(255,255,255,0.3)}
#smsg.show{display:block}
#spag{display:none;justify-content:center;align-items:center;gap:7px;margin-top:20px}
#spag.show{display:flex}
.sk{border-radius:14px;background:rgba(255,255,255,0.04);animation:sh 1.4s ease infinite;background-size:200% 100%;background-image:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 100%)}
.ldtxt{color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:1px;padding:8px 0}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes sh{0%{background-position:-200% center}100%{background-position:200% center}}
</style>
</head>
<body>

<div id="header">
  <div class="hrow">
    <div class="logo">🎮</div>
    <div>
      <div class="htitle">Registro Gamer</div>
      <div class="hsub" id="hsub">carregando...</div>
    </div>
  </div>
  <div id="shelf-filters">
    <div class="chips" id="schips"></div>
    <div class="chips" id="pchips"></div>
  </div>
</div>

<!-- POST READER -->
<div id="post-view">
  <div id="post-hdr">
    <button id="post-back" onclick="closePost()">&#8592; Voltar</button>
    <div id="post-ttl"></div>
  </div>
  <div id="post-date"></div>
  <div id="post-body"></div>
</div>

<!-- BLOG -->
<div class="page show" id="page-blog">
  <div class="ldtxt" id="bld">CARREGANDO POSTS...</div>
  <div id="blist"></div>
  <div id="bmsg" style="display:none;margin-top:30px;text-align:center;color:rgba(255,255,255,0.3)">
    <div style="font-size:36px;margin-bottom:10px">&#9888;</div>
    <div id="bmsg-txt">Sem posts</div>
  </div>
  <div id="bpag" class="pgbar" style="display:none"></div>
</div>

<!-- ESTANTE -->
<div class="page" id="page-shelf">
  <div id="rbar"><span id="rinfo"></span></div>
  <div id="grid"></div>
  <div id="smsg"><div style="font-size:38px;margin-bottom:10px">&#128269;</div><div>Nenhum jogo encontrado</div></div>
  <div id="spag"></div>
</div>

<!-- ARQUIVO -->
<div class="page" id="page-archive">
  <div class="ldtxt" id="ald" style="display:none">CARREGANDO ARQUIVO...</div>
  <div id="arch-list"></div>
</div>

<!-- TAGS -->
<div class="page" id="page-tags">
  <div id="tags-list"></div>
  <div id="tag-results" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.07)">
      <button onclick="closeTagResults()" style="background:rgba(255,255,255,0.07);border:none;border-radius:8px;padding:7px 12px;color:#eee;font-family:Oxanium,sans-serif;font-size:12px;cursor:pointer">&#8592; Tags</button>
      <div id="tag-result-name" style="font-size:13px;font-weight:700;color:#9B59FF"></div>
    </div>
    <div id="tag-post-list"></div>
    <div id="tag-ld" class="ldtxt" style="display:none">CARREGANDO...</div>
    <div id="tag-more-btn" style="display:none;width:100%;padding:11px;margin-top:14px;border-radius:11px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-family:Oxanium,sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center" onclick="loadTagMore()">Carregar mais</div>
  </div>
</div>

<div id="nav">
  <button class="nb on" id="nb-blog" onclick="goTab('blog')">
    <span class="ni">&#128240;</span><span>Blog</span><div class="nd"></div>
  </button>
  <button class="nb" id="nb-shelf" onclick="goTab('shelf')">
    <span class="ni">&#127918;</span><span>Estante</span><div class="nd"></div>
  </button>
  <button class="nb" id="nb-archive" onclick="goTab('archive')">
    <span class="ni">&#128193;</span><span>Arquivo</span><div class="nd"></div>
  </button>
  <button class="nb" id="nb-tags" onclick="goTab('tags')">
    <span class="ni">&#127991;</span><span>Tags</span><div class="nd"></div>
  </button>
</div>

<script>
var BLOG = 'lucniemanngames.blogspot.com';
var SO = ['Favorito','Tenho','Quero','Jogado','Finalizado'];
var SM = {
  Favorito:{c:'#FFD700',i:'&#9733;'},Tenho:{c:'#00E5A0',i:'&#10022;'},
  Quero:{c:'#4DA6FF',i:'&#9678;'},Jogado:{c:'#FF7F50',i:'&#9654;'},
  Finalizado:{c:'#C084FC',i:'&#10003;'}
};
var CP=20, BPGSZ=10;
var games=[],plats=[],sS=null,sP=null,spg=1;
var bposts=[],bcurpg=1;
var allTags=[];
var archivePosts=[],archiveLoaded=false;
var tagPosts=[],tagLoading=false,tagName='';
var curtab='blog';
var MN=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var MNF=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function g(id){return document.getElementById(id);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── TABS ──
function goTab(t){
  curtab=t;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('show');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  g('page-'+t).classList.add('show');
  g('nb-'+t).classList.add('on');
  g('shelf-filters').style.display=t==='shelf'?'block':'none';
  var subs={blog:bposts.length?(bposts.length+(bmore?'+':'')+' posts'):'carregando...',
    shelf:games.length?(games.length+' jogos'):'carregando...',
    archive:'Arquivo',tags:'Tags'};
  g('hsub').textContent=subs[t]||'';
  if(t==='archive'&&!archiveLoaded) loadArchive(1,[]);
  if(t==='tags'&&allTags.length) drawTags();
}

// ── POST READER ──
function openPost(p){
  g('post-ttl').textContent=p.title;
  g('post-date').textContent=p.date;
  g('post-body').innerHTML=p.html;
  g('post-view').classList.add('show');
  g('post-view').scrollTo({top:0});
  g('nav').style.display='none';
}
function closePost(){
  g('post-view').classList.remove('show');
  g('nav').style.display='flex';
}

// ── IMAGE EXTRACT ──
function ximg(e){
  var t=e.media$thumbnail&&e.media$thumbnail.url;
  if(t)return t.replace(/\/s\d+-c\//,'/s400/').replace(/=s\d+-c$/,'=s400').replace(/\/s\d+\//,'/s400/');
  var h=(e.content&&e.content.$t)||(e.summary&&e.summary.$t)||'';
  var m=h.match(/<img[^>]+src=["']([^"']+)/i);return m?m[1]:null;
}

// ── BLOG ──
function loadBlog(si, acc){
  acc = acc || [];
  var cb = 'rgb_'+Date.now()+'_'+si;
  var s = document.createElement('script');
  s.src = 'https://'+BLOG+'/feeds/posts/default?alt=json-in-script&max-results=500&start-index='+si+'&callback='+cb;
  window[cb] = function(d){
    if(si===1 && d.feed && d.feed.category){
      allTags = d.feed.category.map(function(cc){return cc.term;}).sort(function(a,b){return a.localeCompare(b,'pt-BR');});
      if(curtab==='tags') drawTags();
    }
    var en = (d.feed && d.feed.entry) || [];
    var pr = en
      .filter(function(e){return !((e.category||[]).some(function(cc){return cc.term.indexOf('Status - ')===0;}));})
      .map(function(e){
        var th = ximg(e);
        var html = (e.content && e.content.$t) || '';
        var ex = html.replace(/<[^>]+>/g,' ').replace(/&nbsp;/gi,' ').replace(/\s+/g,' ').trim().slice(0,110);
        var dt = e.published && e.published.$t;
        var d2 = dt ? new Date(dt).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}) : '';
        return {title:e.title.$t, thumb:th, ex:ex, html:html, date:d2};
      });
    var all = acc.concat(pr);
    if(en.length === 500){
      loadBlog(si+500, all);
      return;
    }
    bposts = all;
    bcurpg = 1;
    g('bld').style.display = 'none';
    if(curtab==='blog') g('hsub').textContent = bposts.length + ' posts';
    drawBlog(); drawBPag();
    delete window[cb]; s.remove();
  };
  document.head.appendChild(s);
}


function drawBlog(){
  var l = g('blist'); l.innerHTML = '';
  if(!bposts.length){ g('bmsg').style.display='block'; return; }
  g('bmsg').style.display = 'none';
  var start = (bcurpg-1)*BPGSZ;
  var slice = bposts.slice(start, start+BPGSZ);
  slice.forEach(function(p){
    var div = document.createElement('div'); div.className = 'bcard';
    var th = p.thumb ? '<img src="'+esc(p.thumb)+'" loading="lazy">' : '&#128195;';
    div.innerHTML = '<div class="bthumb">'+th+'</div>'
      +'<div class="binfo"><div class="bdate">'+esc(p.date)+'</div><div class="btitle">'+esc(p.title)+'</div><div class="bex">'+esc(p.ex)+'</div></div>'
      +'<div class="barr">&#8250;</div>';
    (function(post){ div.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();openPost(post);}); })(p);
    l.appendChild(div);
  });
}


function drawBPag(){
  var p = g('bpag'); p.innerHTML = '';
  var totalPages = Math.ceil(bposts.length/BPGSZ);
  if(totalPages <= 1){ p.style.display='none'; return; }
  p.style.display = 'flex';
  p.style.flexWrap = 'wrap';
  p.style.gap = '6px';

  var WIN = 10; // pages shown at a time
  // window start: keep current page visible, centered-ish
  var winStart = Math.max(1, bcurpg - Math.floor(WIN/2));
  var winEnd   = Math.min(totalPages, winStart + WIN - 1);
  // shift window left if we're near the end
  if(winEnd - winStart < WIN - 1) winStart = Math.max(1, winEnd - WIN + 1);

  function go(n){ bcurpg=n; drawBlog(); drawBPag(); window.scrollTo({top:0,behavior:'smooth'}); }

  function mkbtn(label, disabled, onclick, active, wide){
    var b = document.createElement('button');
    b.className = 'pb' + (active?' on':'');
    if(wide) b.style.cssText = 'padding:0 10px;width:auto;font-size:11px;font-family:Oxanium,sans-serif;';
    b.innerHTML = label; b.disabled = disabled;
    if(!disabled && onclick) b.onclick = onclick;
    return b;
  }

  // « Início — jump to page 1
  p.appendChild(mkbtn('&#171; In&iacute;cio', bcurpg===1, function(){go(1);}, false, true));

  // ... if window doesn't start at 1
  if(winStart > 1){
    var d=document.createElement('span');d.textContent='...';d.style.cssText='color:rgba(255,255,255,0.3);align-self:center;font-size:11px;padding:0 2px';
    p.appendChild(d);
  }

  // numbered window
  for(var n=winStart; n<=winEnd; n++){
    (function(nn){ p.appendChild(mkbtn(nn, false, function(){go(nn);}, nn===bcurpg, false)); })(n);
  }

  // ... if window doesn't reach the end
  if(winEnd < totalPages){
    var d2=document.createElement('span');d2.textContent='...';d2.style.cssText='color:rgba(255,255,255,0.3);align-self:center;font-size:11px;padding:0 2px';
    p.appendChild(d2);
  }

  // Fim » — jump to last page
  p.appendChild(mkbtn('Fim &#187;', bcurpg===totalPages, function(){go(totalPages);}, false, true));
}


function loadTagMore(){if(tagHasMore)fetchTagPosts(tagName,tagSI);}

// ── SHELF ──
function loadShelf(si,acc){
  var cb='rg_'+Date.now()+'_'+si;
  var s=document.createElement('script');
  s.src='https://'+BLOG+'/feeds/posts/default?alt=json-in-script&max-results=500&start-index='+si+'&orderby=updated&callback='+cb;
  window[cb]=function(d){
    var en=(d.feed&&d.feed.entry)||[];
    var pr=en.map(function(e){
      return{title:e.title.$t,
        ss:(e.category||[]).filter(function(c){return c.term.indexOf('Status - ')===0;}).map(function(c){return c.term.replace('Status - ','');}),
        pl:(function(){var p=(e.category||[]).find(function(c){return c.term.indexOf('Plataforma - ')===0;});return p?p.term.replace('Plataforma - ',''):'';})(),
        img:ximg(e)};
    }).filter(function(x){return x.ss.length>0;});
    var all=acc.concat(pr);
    if(en.length===500){loadShelf(si+500,all);return;}
    all.sort(function(a,b){return a.title.localeCompare(b.title,'pt-BR');});
    games=all;var seen={};plats=[];
    all.forEach(function(x){if(x.pl&&!seen[x.pl]){seen[x.pl]=1;plats.push(x.pl);}});
    plats.sort(function(a,b){return a.localeCompare(b,'pt-BR');});
    if(curtab==='shelf') g('hsub').textContent=games.length+' jogos';
    drawSC();drawPC();drawShelf();
    delete window[cb];s.remove();
  };
  document.head.appendChild(s);
}
function drawSC(){
  var r=g('schips');r.innerHTML='';
  SO.forEach(function(s){
    var cnt=games.filter(function(x){return x.ss.indexOf(s)!==-1&&(!sP||x.pl===sP);}).length;
    var on=sS===s,m=SM[s];
    var b=document.createElement('button');b.className='chip'+(on?' on':'');
    if(on)b.style.cssText='border-color:'+m.c+';color:'+m.c+';background:rgba(0,0,0,.4);box-shadow:0 0 10px '+m.c;
    b.innerHTML=s+'<span class="cn"'+(on?' style="background:'+m.c+';color:#000"':'')+'>'+cnt+'</span>';
    b.onclick=function(){sS=sS===s?null:s;spg=1;drawSC();drawPC();drawShelf();};r.appendChild(b);
  });
}
function drawPC(){
  var r=g('pchips');r.innerHTML='';
  if(!plats.length)return;
  var ao=!sP,ab=document.createElement('button');ab.className='chip'+(ao?' on':'');
  if(ao)ab.style.cssText='border-color:#00E5A0;color:#00E5A0;background:rgba(0,0,0,.4);box-shadow:0 0 10px #00E5A0';
  ab.textContent='Todas';ab.onclick=function(){sP=null;spg=1;drawSC();drawPC();drawShelf();};r.appendChild(ab);
  plats.forEach(function(p){
    var cnt=games.filter(function(x){return x.pl===p&&(!sS||x.ss.indexOf(sS)!==-1);}).length;
    var on=sP===p,b=document.createElement('button');b.className='chip'+(on?' on':'');
    if(on)b.style.cssText='border-color:#00E5A0;color:#00E5A0;background:rgba(0,0,0,.4);box-shadow:0 0 10px #00E5A0';
    b.innerHTML=p+'<span class="cn"'+(on?' style="background:#00E5A0;color:#000"':'')+'>'+cnt+'</span>';
    b.onclick=function(){sP=sP===p?null:p;spg=1;drawSC();drawPC();drawShelf();};r.appendChild(b);
  });
}
function fi(){return games.filter(function(x){return(!sS||x.ss.indexOf(sS)!==-1)&&(!sP||x.pl===sP);});}
function drawShelf(){
  var f=fi(),tp=Math.ceil(f.length/CP);
  if(spg>tp&&tp>0)spg=1;
  var sl=f.slice((spg-1)*CP,spg*CP);
  g('rbar').style.display=f.length>0?'flex':'none';
  g('rinfo').textContent=f.length+(f.length===1?' jogo':' jogos')+(tp>1?' · pág. '+spg+'/'+tp:'');
  g('smsg').classList.toggle('show',f.length===0&&games.length>0);
  var grid=g('grid');grid.innerHTML='';
  sl.forEach(function(gm,i){grid.appendChild(mkCard(gm,i));});
  drawSPag(tp);window.scrollTo({top:0,behavior:'smooth'});
}
function mkCard(gm,i){
  var sc=gm.ss.map(function(s){return SM[s]&&SM[s].c;}).filter(Boolean);
  var c=document.createElement('div');c.className='card';c.style.animationDelay=(i*0.03)+'s';
  var bar=document.createElement('div');bar.className='cbar';
  sc.forEach(function(col){var sp=document.createElement('span');sp.style.background=col;bar.appendChild(sp);});c.appendChild(bar);
  var cv=document.createElement('div');cv.className='cimg';
  if(gm.img){var im=document.createElement('img');im.src=gm.img;im.alt=gm.title;im.loading='lazy';im.onerror=function(){cv.innerHTML='<div class="cnoi">&#127918;</div>';};cv.appendChild(im);}
  else{cv.innerHTML='<div class="cnoi">&#127918;</div>';}
  var ov=document.createElement('div');ov.className='cov';cv.appendChild(ov);c.appendChild(cv);
  var inf=document.createElement('div');inf.className='cinfo';
  inf.innerHTML='<div class="ctitle">'+esc(gm.title)+'</div>'+(gm.pl?'<div class="cplat">'+esc(gm.pl)+'</div>':'');
  var tg=document.createElement('div');tg.className='ctags';
  gm.ss.forEach(function(s){var m=SM[s];if(!m)return;var t=document.createElement('span');t.className='ctag';t.style.cssText='background:rgba(0,0,0,.5);border:1px solid '+m.c+';color:'+m.c;t.textContent=m.i+' '+s;tg.appendChild(t);});
  inf.appendChild(tg);c.appendChild(inf);return c;
}
function drawSPag(tp){
  var p=g('spag');p.innerHTML='';
  if(tp<=1){p.classList.remove('show');return;}p.classList.add('show');
  var pv=document.createElement('button');pv.className='pb nav';pv.innerHTML='&#8249;';pv.disabled=spg===1;pv.onclick=function(){if(spg>1){spg--;drawShelf();}};p.appendChild(pv);
  var s=1,e=tp;if(tp>5){if(spg<=3){s=1;e=5;}else if(spg>=tp-2){s=tp-4;e=tp;}else{s=spg-2;e=spg+2;}}
  for(var n=s;n<=e;n++){(function(nn){var b=document.createElement('button');b.className='pb'+(nn===spg?' on':'');b.textContent=nn;b.onclick=function(){spg=nn;drawShelf();};p.appendChild(b);})(n);}
  var nx=document.createElement('button');nx.className='pb nav';nx.innerHTML='&#8250;';nx.disabled=spg===tp;nx.onclick=function(){if(spg<tp){spg++;drawShelf();}};p.appendChild(nx);
}

loadBlog(1);
loadShelf(1,[]);
</script>
