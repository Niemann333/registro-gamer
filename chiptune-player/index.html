<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chiptune Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #070d07; overflow: hidden; }
    #status {
      font-family: monospace;
      font-size: 10px; color: #2a5a2a;
      padding: 4px 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      height: 22px; line-height: 14px;
    }
    #status.playing { color: #39ff14; }
    #status.error   { color: #ff4444; }
    #root { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status">Inicializando...</div>

  <script>
    // ── Intercepta AudioContext ANTES do bundle ──
    // Isso nos dá controle de pause/resume sem depender de API interna
    var _capturedCtx = null;
    var _OrigAC = window.AudioContext || window.webkitAudioContext;
    if (_OrigAC) {
      var _PatchedAC = function() {
        var ctx = new _OrigAC();
        _capturedCtx = ctx;
        return ctx;
      };
      _PatchedAC.prototype = _OrigAC.prototype;
      window.AudioContext = window.webkitAudioContext = _PatchedAC;
    }

    var songUrl     = null;
    var playerReady = false;

    // Lê ?url=
    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
      songUrl = decodeURIComponent(params.get('url'));
      try { sessionStorage.setItem('chipSongUrl', songUrl); } catch(e){}
    } else {
      try {
        var saved = sessionStorage.getItem('chipSongUrl');
        if (saved) { songUrl = saved; sessionStorage.removeItem('chipSongUrl'); }
      } catch(e){}
    }

    function stripExt(s) { return s.replace(/\.[^.]+$/, ''); }

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls || '';
    }

    function seq() {
      return window.ChipPlayer && window.ChipPlayer.sequencer;
    }

    // Recebe comandos do gadget
    window.addEventListener('message', function(e) {
      if (!e.data) return;
      var d = e.data;

      if (d.type === 'play' && d.url) {
        songUrl = d.url;
        if (playerReady) startPlay();
      }
      if (d.type === 'pause') {
        if (_capturedCtx && _capturedCtx.state === 'running') {
          _capturedCtx.suspend();
          setStatus('⏸ Pausado', '');
        }
      }
      if (d.type === 'resume') {
        if (_capturedCtx && _capturedCtx.state === 'suspended') {
          _capturedCtx.resume();
          var name = songUrl ? stripExt(decodeURIComponent(songUrl.split('/').pop())) : '';
          setStatus('♪ ' + name, 'playing');
        }
      }
    });

    function startPlay() {
      if (!songUrl || !seq()) return;
      // Garante que o AudioContext está rodando
      if (_capturedCtx && _capturedCtx.state === 'suspended') {
        _capturedCtx.resume();
      }
      var name = stripExt(decodeURIComponent(songUrl.split('/').pop()));
      setStatus('♪ ' + name, 'playing');
      try {
        seq().playSonglist([songUrl]);
      } catch(ex) {
        setStatus('Erro: ' + ex.message, 'error');
      }
    }

    // SW + bundle
    if ('serviceWorker' in navigator) {
      var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
      navigator.serviceWorker.register(swPath).then(function(reg) {
        if (reg.installing) {
          reg.installing.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else if (reg.waiting) {
          reg.waiting.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else {
          loadBundle();
        }
      }).catch(function() { loadBundle(); });
    } else {
      loadBundle();
    }

    function loadBundle() {
      var s = document.createElement('script');
      var base = location.pathname.replace(/\/[^/]*$/, '');
      s.src = base + '/static/js/main.0a47.js';
      s.onload = function() {
        var tries = 0;
        var iv = setInterval(function() {
          tries++;
          if (seq()) {
            clearInterval(iv);
            playerReady = true;
            try { window.parent.postMessage({ type: 'ready' }, '*'); } catch(ex){}
            if (songUrl) startPlay();
            else setStatus('Pronto.', '');
          } else if (tries > 100) {
            clearInterval(iv);
            setStatus('Timeout.', 'error');
          }
        }, 300);
      };
      s.onerror = function() { setStatus('Erro bundle.', 'error'); };
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
