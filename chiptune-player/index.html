<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chiptune Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #070d07; overflow: hidden; }
    #status {
      font-family: monospace; font-size: 10px; color: #2a5a2a;
      padding: 4px 8px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; height: 22px; line-height: 14px;
    }
    #status.playing { color: #39ff14; }
    #status.error   { color: #ff4444; }
    #root { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status">Inicializando...</div>
  <script>
    var _ctx      = null;
    var _analyser = null;
    var _analyserPatched = false;
    var _ctxStartTime    = 0;
    var _endedSent       = false;
    var _silenceCount    = 0;
    var _SILENCE_NEEDED  = 4;   // 4 × 500ms = 2s de silêncio → fim da música
    var _SILENCE_RMS     = 0.0005; // limiar de amplitude

    // ── 1. Intercepta AudioContext ──
    var _OrigAC = window.AudioContext || window.webkitAudioContext;
    if (_OrigAC) {
      var _Patched = function() {
        _ctx = new _OrigAC();
        // Cria AnalyserNode imediatamente após o contexto existir
        _setupAnalyser();
        return _ctx;
      };
      _Patched.prototype = _OrigAC.prototype;
      window.AudioContext = window.webkitAudioContext = _Patched;
    }

    function _setupAnalyser() {
      if (!_ctx || _analyser) return;
      _analyser = _ctx.createAnalyser();
      _analyser.fftSize = 2048;

      // ── 2. Intercepta connect() para rotear TUDO pelo AnalyserNode ──
      if (!_analyserPatched) {
        _analyserPatched = true;
        var _OrigConnect = AudioNode.prototype.connect;
        // Conecta o analyser ao destino final (só uma vez)
        var _analyserToDestinationDone = false;

        AudioNode.prototype.connect = function(dest, outIdx, inIdx) {
          // Se alguém tenta conectar ao destino final do contexto
          if (_ctx && dest === _ctx.destination) {
            // Roteia pelo analyser primeiro
            if (!_analyserToDestinationDone) {
              _analyserToDestinationDone = true;
              _OrigConnect.call(_analyser, _ctx.destination);
            }
            // Conecta este nó ao analyser em vez do destino direto
            return _OrigConnect.call(this, _analyser, outIdx, inIdx);
          }
          return _OrigConnect.apply(this, arguments);
        };
      }
    }

    // ── 3. Detecção de silêncio via AnalyserNode ──
    function checkSilence() {
      if (!_analyser || !_ctx || _ctx.state !== 'running' || _endedSent) return;
      var data = new Float32Array(_analyser.fftSize);
      _analyser.getFloatTimeDomainData(data);
      var rms = 0;
      for (var i = 0; i < data.length; i++) rms += data[i] * data[i];
      rms = Math.sqrt(rms / data.length);
      if (rms < _SILENCE_RMS) {
        _silenceCount++;
        if (_silenceCount >= _SILENCE_NEEDED) {
          _endedSent = true;
          try { window.parent.postMessage({ type: 'songEnded' }, '*'); } catch(e){}
        }
      } else {
        _silenceCount = 0;
      }
    }

    var songUrl     = null;
    var playerReady = false;
    var posTimer    = null;

    // Lê ?url=
    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
      songUrl = decodeURIComponent(params.get('url'));
      try { sessionStorage.setItem('chipSongUrl', songUrl); } catch(e){}
    } else {
      try {
        var saved = sessionStorage.getItem('chipSongUrl');
        if (saved) { songUrl = saved; sessionStorage.removeItem('chipSongUrl'); }
      } catch(e){}
    }

    function stripExt(s) { return s.replace(/\.[^.]+$/, ''); }
    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg; el.className = cls || '';
    }
    function seq() { return window.ChipPlayer && window.ChipPlayer.sequencer; }

    // ── Polling: posição + detecção de silêncio ──
    function startPoller() {
      if (posTimer) clearInterval(posTimer);
      _ctxStartTime = _ctx ? _ctx.currentTime : 0;
      _endedSent    = false;
      _silenceCount = 0;

      posTimer = setInterval(function() {
        if (!_ctx) return;
        var pos = Math.max(0, _ctx.currentTime - _ctxStartTime);
        try {
          window.parent.postMessage({
            type: 'position',
            posSec: pos,
            state: _ctx.state
          }, '*');
        } catch(e){}
        checkSilence();
      }, 500);
    }

    // ── Recebe comandos do gadget ──
    window.addEventListener('message', function(e) {
      if (!e.data) return;
      var d = e.data;
      if (d.type === 'play' && d.url) {
        songUrl = d.url;
        if (playerReady) startPlay();
      }
      if (d.type === 'pause') {
        if (_ctx && _ctx.state === 'running') _ctx.suspend();
        setStatus('⏸ Pausado', '');
      }
      if (d.type === 'resume') {
        if (_ctx && _ctx.state === 'suspended') _ctx.resume();
        var name = songUrl ? stripExt(decodeURIComponent(songUrl.split('/').pop())) : '';
        setStatus('♪ ' + name, 'playing');
      }
    });

    function startPlay() {
      if (!songUrl || !seq()) return;
      if (_ctx && _ctx.state === 'suspended') _ctx.resume();
      _endedSent = false;
      _silenceCount = 0;
      var name = stripExt(decodeURIComponent(songUrl.split('/').pop()));
      setStatus('♪ ' + name, 'playing');
      try {
        seq().playSonglist([songUrl]);
        setTimeout(startPoller, 300);
      } catch(ex) {
        setStatus('Erro: ' + ex.message, 'error');
      }
    }

    // ── SW + bundle ──
    if ('serviceWorker' in navigator) {
      var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
      navigator.serviceWorker.register(swPath).then(function(reg) {
        if (reg.installing) {
          reg.installing.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else if (reg.waiting) {
          reg.waiting.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else { loadBundle(); }
      }).catch(function() { loadBundle(); });
    } else { loadBundle(); }

    function loadBundle() {
      var s = document.createElement('script');
      s.src = (location.pathname.replace(/\/[^/]*$/, '')) + '/static/js/main.0a47.js';
      s.onload = function() {
        var tries = 0;
        var iv = setInterval(function() {
          tries++;
          if (seq()) {
            clearInterval(iv);
            playerReady = true;
            try { window.parent.postMessage({ type: 'ready' }, '*'); } catch(e){}
            if (songUrl) startPlay();
            else setStatus('Pronto.', '');
          } else if (tries > 100) {
            clearInterval(iv);
            setStatus('Timeout.', 'error');
          }
        }, 300);
      };
      s.onerror = function() { setStatus('Erro bundle.', 'error'); };
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
