<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chiptune Player</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#070d07; overflow:hidden; }
    #status {
      font-family:monospace; font-size:10px; color:#2a5a2a;
      padding:4px 8px; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; height:22px; line-height:14px;
    }
    #status.playing { color:#39ff14; }
    #status.error   { color:#ff4444; }
    #root { display:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status">Inicializando...</div>
  <script>
    var _ctx       = null;
    var _analyser  = null;
    var _linked    = false;
    var _ctxStart  = 0;
    var _silCount  = 0;
    var _silNeeded = 6;
    var _silRMS    = 0.001;
    var _endedSent = false;
    var _posTimer  = null;

    // ── Captura AudioContext sem quebrar instanceof ──
    // Simplesmente observa a criação sem subclassificar
    var _OrigAC = window.AudioContext || window.webkitAudioContext;
    if (_OrigAC) {
      var _WrappedAC = function() {
        _ctx = new _OrigAC();
        setupAnalyser();
        return _ctx;  // retorna o objeto real, não this
      };
      _WrappedAC.prototype = _OrigAC.prototype;
      window.AudioContext = _WrappedAC;
      if (window.webkitAudioContext) window.webkitAudioContext = _WrappedAC;
    }

    function setupAnalyser() {
      if (!_ctx || _analyser) return;
      try {
        _analyser = _ctx.createAnalyser();
        _analyser.fftSize = 2048;
        // Intercepta connect para rotear pelo analyser
        var _origConn = AudioNode.prototype.connect;
        AudioNode.prototype.connect = function(dest, a, b) {
          if (_ctx && dest === _ctx.destination) {
            if (!_linked) {
              _linked = true;
              _origConn.call(_analyser, _ctx.destination);
            }
            return _origConn.call(this, _analyser, a, b);
          }
          return _origConn.apply(this, arguments);
        };
      } catch(e) {}
    }

    function checkSilence() {
      if (!_analyser || !_ctx || _ctx.state !== 'running' || _endedSent) return;
      try {
        var buf = new Float32Array(_analyser.fftSize);
        _analyser.getFloatTimeDomainData(buf);
        var rms = 0;
        for (var i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
        rms = Math.sqrt(rms / buf.length);
        if (rms < _silRMS) { _silCount++; } else { _silCount = 0; }
        if (_silCount >= _silNeeded) {
          _endedSent = true; _silCount = 0;
          try { window.parent.postMessage({ type: 'songEnded' }, '*'); } catch(e) {}
        }
      } catch(e) {}
    }

    var songUrl = null, playerReady = false;

    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
      songUrl = decodeURIComponent(params.get('url'));
      try { sessionStorage.setItem('chipSongUrl', songUrl); } catch(e) {}
    } else {
      try {
        var sv = sessionStorage.getItem('chipSongUrl');
        if (sv) { songUrl = sv; sessionStorage.removeItem('chipSongUrl'); }
      } catch(e) {}
    }

    function stripExt(s) { return s.replace(/\.[^.]+$/, ''); }
    function setStatus(m, c) {
      var el = document.getElementById('status');
      el.textContent = m; el.className = c || '';
    }
    function seq() { return window.ChipPlayer && window.ChipPlayer.sequencer; }

    function startPoller() {
      if (_posTimer) clearInterval(_posTimer);
      _ctxStart  = _ctx ? _ctx.currentTime : 0;
      _endedSent = false;
      _silCount  = 0;
      _posTimer  = setInterval(function() {
        if (!_ctx) return;
        var pos = Math.max(0, _ctx.currentTime - _ctxStart);
        try { window.parent.postMessage({ type: 'position', posSec: pos }, '*'); } catch(e) {}
        checkSilence();
      }, 300);
    }

    window.addEventListener('message', function(e) {
      if (!e.data) return;
      var d = e.data;
      if (d.type === 'play' && d.url) {
        songUrl = d.url; _endedSent = false;
        if (playerReady) startPlay();
      }
      if (d.type === 'pause') {
        try { if (_ctx && _ctx.state === 'running') _ctx.suspend(); } catch(e) {}
      }
      if (d.type === 'resume') {
        try { if (_ctx && _ctx.state === 'suspended') _ctx.resume(); } catch(e) {}
      }
    });

    function startPlay() {
      if (!songUrl || !seq()) return;
      try { if (_ctx && _ctx.state === 'suspended') _ctx.resume(); } catch(e) {}
      _endedSent = false; _silCount = 0;
      setStatus('\u266A ' + stripExt(decodeURIComponent(songUrl.split('/').pop())), 'playing');
      try {
        seq().playSonglist([songUrl]);
        setTimeout(startPoller, 500);
      } catch(ex) { setStatus('Erro: ' + ex.message, 'error'); }
    }

    // SW + bundle
    if ('serviceWorker' in navigator) {
      var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
      navigator.serviceWorker.register(swPath).then(function(reg) {
        if (reg.installing) {
          reg.installing.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else if (reg.waiting) {
          reg.waiting.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else {
          loadBundle();
        }
      }).catch(loadBundle);
    } else {
      loadBundle();
    }

    function loadBundle() {
      var s = document.createElement('script');
      s.src = (location.pathname.replace(/\/[^/]*$/, '')) + '/static/js/main.0a47.js';
      s.onload = function() {
        var tries = 0;
        var iv = setInterval(function() {
          tries++;
          if (seq()) {
            clearInterval(iv);
            playerReady = true;
            try { window.parent.postMessage({ type: 'ready' }, '*'); } catch(e) {}
            if (songUrl) startPlay();
            else setStatus('Pronto.', '');
          } else if (tries > 100) {
            clearInterval(iv);
            setStatus('Timeout.', 'error');
          }
        }, 300);
      };
      s.onerror = function() { setStatus('Erro bundle.', 'error'); };
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
