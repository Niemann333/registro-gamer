<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chiptune Player</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#070d07; overflow:hidden; }
    #status {
      font-family:monospace; font-size:10px; color:#2a5a2a;
      padding:4px 8px; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; height:22px; line-height:14px;
    }
    #status.playing { color:#39ff14; }
    #status.error   { color:#ff4444; }
    #root { display:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status">Inicializando...</div>
  <script>
    var _ctx       = null;
    var _gainNode  = null;   // controla volume / fade
    var _analyser  = null;   // detecta silêncio
    var _ctxStart  = 0;
    var _silCount  = 0;
    var _endedSent = false;
    var _posTimer  = null;

    // Salva o connect original ANTES de qualquer patch
    var _origConn = AudioNode.prototype.connect;

    // Captura o AudioContext criado pelo bundle
    var _OrigAC = window.AudioContext || window.webkitAudioContext;
    if (_OrigAC) {
      var _Wrap = function() {
        _ctx = new _OrigAC();
        setupNodes();
        return _ctx;
      };
      _Wrap.prototype = _OrigAC.prototype;
      window.AudioContext = window.webkitAudioContext = _Wrap;
    }

    function setupNodes() {
      if (!_ctx || _gainNode) return;
      try {
        _gainNode  = _ctx.createGain();
        _analyser  = _ctx.createAnalyser();
        _analyser.fftSize = 2048;
        _gainNode.gain.value = 1.0;

        // Cadeia: source → gainNode → analyser → destination
        // Usa origConn para não acionar nosso próprio patch
        _origConn.call(_gainNode, _analyser);
        _origConn.call(_analyser, _ctx.destination);

        // Patch: redireciona qualquer connect ao destination para o gainNode
        AudioNode.prototype.connect = function(dest, a, b) {
          if (_ctx && dest === _ctx.destination) {
            return _origConn.call(this, _gainNode, a, b);
          }
          return _origConn.apply(this, arguments);
        };
      } catch(e) {}
    }

    // Fade out via GainNode (~3s) — silence detector dispara songEnded automaticamente
    function doFadeOut() {
      if (!_gainNode || !_ctx) return;
      var now = _ctx.currentTime;
      _gainNode.gain.cancelScheduledValues(now);
      _gainNode.gain.setValueAtTime(_gainNode.gain.value, now);
      _gainNode.gain.linearRampToValueAtTime(0.0, now + 3.0);
    }

    function checkSilence() {
      if (!_analyser || !_ctx || _ctx.state !== 'running' || _endedSent) return;
      try {
        var buf = new Float32Array(_analyser.fftSize);
        _analyser.getFloatTimeDomainData(buf);
        var rms = 0;
        for (var i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
        rms = Math.sqrt(rms / buf.length);
        if (rms < 0.001) { _silCount++; } else { _silCount = 0; }
        if (_silCount >= 6) {
          _endedSent = true;
          try { window.parent.postMessage({ type: 'songEnded' }, '*'); } catch(e) {}
        }
      } catch(e) {}
    }

    var songUrl = null, playerReady = false;

    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
      songUrl = decodeURIComponent(params.get('url'));
      try { sessionStorage.setItem('chipSongUrl', songUrl); } catch(e) {}
    } else {
      try {
        var sv = sessionStorage.getItem('chipSongUrl');
        if (sv) { songUrl = sv; sessionStorage.removeItem('chipSongUrl'); }
      } catch(e) {}
    }

    function seq() { return window.ChipPlayer && window.ChipPlayer.sequencer; }
    function setStatus(m, c) { var el = document.getElementById('status'); el.textContent = m; el.className = c || ''; }

    function startPoller() {
      if (_posTimer) clearInterval(_posTimer);
      _ctxStart  = _ctx ? _ctx.currentTime : 0;
      _endedSent = false;
      _silCount  = 0;
      _posTimer  = setInterval(function() {
        if (!_ctx) return;
        var pos = Math.max(0, _ctx.currentTime - _ctxStart);
        try { window.parent.postMessage({ type: 'position', posSec: pos }, '*'); } catch(e) {}
        checkSilence();
      }, 300);
    }

    window.addEventListener('message', function(e) {
      if (!e.data) return;
      var d = e.data;
      if (d.type === 'play' && d.url) {
        songUrl = d.url; _endedSent = false;
        if (playerReady) startPlay();
      }
      if (d.type === 'pause') {
        try { if (_ctx && _ctx.state === 'running') _ctx.suspend(); } catch(e) {}
      }
      if (d.type === 'resume') {
        try { if (_ctx && _ctx.state === 'suspended') _ctx.resume(); } catch(e) {}
      }
      if (d.type === 'fadeout') {
        // Gadget pediu fade — silence detector vai pegar e enviar songEnded
        doFadeOut();
      }
    });

    function startPlay() {
      if (!songUrl || !seq()) return;
      try { if (_ctx && _ctx.state === 'suspended') _ctx.resume(); } catch(e) {}
      // Reseta gain para 1.0 (caso fade anterior não tenha terminado)
      if (_gainNode && _ctx) {
        _gainNode.gain.cancelScheduledValues(_ctx.currentTime);
        _gainNode.gain.setValueAtTime(1.0, _ctx.currentTime);
      }
      _endedSent = false; _silCount = 0;
      var n = songUrl.split('/').pop().replace(/\.[^.]+$/, '');
      try { n = decodeURIComponent(n); } catch(e) {}
      setStatus('\u266A ' + n, 'playing');
      try {
        seq().playSonglist([songUrl]);
        setTimeout(startPoller, 500);
      } catch(ex) { setStatus('Erro: ' + ex.message, 'error'); }
    }

    // SW + bundle
    if ('serviceWorker' in navigator) {
      var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
      navigator.serviceWorker.register(swPath).then(function(reg) {
        if (reg.installing) {
          reg.installing.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else if (reg.waiting) {
          reg.waiting.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else { loadBundle(); }
      }).catch(loadBundle);
    } else { loadBundle(); }

    function loadBundle() {
      var s = document.createElement('script');
      s.src = (location.pathname.replace(/\/[^/]*$/, '')) + '/static/js/main.0a47.js';
      s.onload = function() {
        var tries = 0;
        var iv = setInterval(function() {
          tries++;
          if (seq()) {
            clearInterval(iv); playerReady = true;
            try { window.parent.postMessage({ type: 'ready' }, '*'); } catch(e) {}
            if (songUrl) startPlay(); else setStatus('Pronto.', '');
          } else if (tries > 100) {
            clearInterval(iv); setStatus('Timeout.', 'error');
          }
        }, 300);
      };
      s.onerror = function() { setStatus('Erro ao carregar bundle.', 'error'); };
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
