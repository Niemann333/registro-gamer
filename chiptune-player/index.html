<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chiptune Player</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#070d07; overflow:hidden; }
    #status {
      font-family:monospace; font-size:10px; color:#2a5a2a;
      padding:4px 8px; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; height:22px; line-height:14px;
    }
    #status.playing { color:#39ff14; }
    #status.error   { color:#ff4444; }
    #root { display:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status">Inicializando...</div>
  <script>
    // ── Intercepta AudioContext para pause/resume ──
    var _ctx = null, _analyser = null, _linked = false;
    var _OrigAC = window.AudioContext || window.webkitAudioContext;
    if (_OrigAC) {
      window.AudioContext = window.webkitAudioContext = function() {
        _ctx = new _OrigAC();
        _analyser = _ctx.createAnalyser();
        _analyser.fftSize = 2048;
        var _orig = AudioNode.prototype.connect;
        AudioNode.prototype.connect = function(dest, a, b) {
          if (_ctx && dest === _ctx.destination) {
            if (!_linked) { _linked = true; _orig.call(_analyser, _ctx.destination); }
            return _orig.call(this, _analyser, a, b);
          }
          return _orig.apply(this, arguments);
        };
        return _ctx;
      };
      window.AudioContext.prototype = _OrigAC.prototype;
    }

    var songUrl = null, playerReady = false;
    var _ctxStartTime = 0; // ctx.currentTime quando a música começou
    var _posTimer = null;
    var _endedSent = false;
    var _stateHooked = false;

    // ── Lê ?url= ──
    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
      songUrl = decodeURIComponent(params.get('url'));
      try { sessionStorage.setItem('chipSongUrl', songUrl); } catch(e) {}
    } else {
      try { var sv = sessionStorage.getItem('chipSongUrl'); if (sv) { songUrl = sv; sessionStorage.removeItem('chipSongUrl'); } } catch(e) {}
    }

    function stripExt(s) { return s.replace(/\.[^.]+$/, ''); }
    function setStatus(m, c) { var el = document.getElementById('status'); el.textContent = m; el.className = c || ''; }
    function seq() { return window.ChipPlayer && window.ChipPlayer.sequencer; }

    // ── Intercepta handlePlayerStateupdate do sequencer ──
    // É chamado com (isStopped, numVoices) quando o chip para
    function hookSequencer() {
      if (_stateHooked || !seq()) return;
      _stateHooked = true;
      var s = seq();
      var orig = s.handlePlayerStateupdate;
      s.handlePlayerStateupdate = function(isStopped, numVoices) {
        // Chama o handler original (que pode chamar advanceSong internamente)
        if (orig) orig.apply(this, arguments);
        // Informa o gadget
        if (isStopped && !_endedSent) {
          _endedSent = true;
          try { window.parent.postMessage({ type: 'songEnded' }, '*'); } catch(e) {}
        }
      };
    }

    // ── Polling de posição via AudioContext.currentTime ──
    // currentTime avança com o áudio real (para em suspend, retoma em resume)
    function startPoller() {
      if (_posTimer) clearInterval(_posTimer);
      _ctxStartTime = _ctx ? _ctx.currentTime : 0;
      _endedSent = false;

      _posTimer = setInterval(function() {
        if (!_ctx) return;
        var pos = Math.max(0, _ctx.currentTime - _ctxStartTime);
        try {
          window.parent.postMessage({
            type: 'position',
            posSec: pos,
            state: _ctx.state
          }, '*');
        } catch(e) {}
      }, 200);
    }

    // ── Recebe comandos do gadget ──
    window.addEventListener('message', function(e) {
      if (!e.data) return;
      var d = e.data;
      if (d.type === 'play' && d.url) {
        songUrl = d.url; _endedSent = false;
        if (playerReady) startPlay();
      }
      if (d.type === 'pause')  {
        if (_ctx && _ctx.state === 'running') _ctx.suspend();
      }
      if (d.type === 'resume') {
        if (_ctx && _ctx.state === 'suspended') _ctx.resume();
      }
    });

    function startPlay() {
      if (!songUrl || !seq()) return;
      if (_ctx && _ctx.state === 'suspended') _ctx.resume();
      _endedSent = false;
      var n = stripExt(decodeURIComponent(songUrl.split('/').pop()));
      setStatus('\u266A ' + n, 'playing');
      try {
        seq().playSonglist([songUrl]);
        hookSequencer();
        setTimeout(startPoller, 400);
      } catch(ex) {
        setStatus('Erro: ' + ex.message, 'error');
      }
    }

    // ── SW + bundle ──
    if ('serviceWorker' in navigator) {
      var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
      navigator.serviceWorker.register(swPath).then(function(reg) {
        if (reg.installing) reg.installing.addEventListener('statechange', function() { if (this.state === 'activated') location.reload(); });
        else if (reg.waiting) reg.waiting.addEventListener('statechange', function() { if (this.state === 'activated') location.reload(); });
        else loadBundle();
      }).catch(loadBundle);
    } else loadBundle();

    function loadBundle() {
      var s = document.createElement('script');
      s.src = (location.pathname.replace(/\/[^/]*$/, '')) + '/static/js/main.0a47.js';
      s.onload = function() {
        var tries = 0, iv = setInterval(function() {
          tries++;
          if (seq()) {
            clearInterval(iv);
            playerReady = true;
            hookSequencer();
            try { window.parent.postMessage({ type: 'ready' }, '*'); } catch(e) {}
            if (songUrl) startPlay(); else setStatus('Pronto.', '');
          } else if (tries > 100) { clearInterval(iv); setStatus('Timeout.', 'error'); }
        }, 300);
      };
      s.onerror = function() { setStatus('Erro bundle.', 'error'); };
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
