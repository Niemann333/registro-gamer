<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chiptune Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #070d07;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    #status {
      font-size: 10px;
      color: #4a7a4a;
      padding: 5px 10px 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.5px;
    }
    #status.playing { color: #39ff14; }
    #status.error   { color: #ff4444; }

    #seek-wrap {
      padding: 3px 10px 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    #seek-track {
      flex: 1;
      height: 4px;
      background: #1a3a1a;
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }
    #seek-fill {
      height: 100%;
      background: #39ff14;
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
      transition: width 0.4s linear;
    }
    #seek-track:hover #seek-fill { background: #6fff3a; }
    #seek-thumb {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 9px; height: 9px;
      background: #39ff14;
      border-radius: 50%;
      left: 0%;
      margin-left: -4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #seek-track:hover #seek-thumb { opacity: 1; }

    #time-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 10px 4px;
      font-size: 9px;
      color: #2a4a2a;
      letter-spacing: 1px;
    }
    #root { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status">Inicializando player...</div>
  <div id="seek-wrap">
    <div id="seek-track">
      <div id="seek-fill"></div>
      <div id="seek-thumb"></div>
    </div>
  </div>
  <div id="time-row">
    <span id="time-cur">0:00</span>
    <span id="time-dur">0:00</span>
  </div>

  <script>
    var songUrl     = null;
    var playerReady = false;
    var seeking     = false;
    var ended       = false;
    var watchTimer  = null;

    // Lê ?url=
    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
      songUrl = decodeURIComponent(params.get('url'));
      // Salva para sobreviver reload do SW
      try { sessionStorage.setItem('chipSongUrl', songUrl); } catch(e){}
    } else {
      try {
        var saved = sessionStorage.getItem('chipSongUrl');
        if (saved) { songUrl = saved; sessionStorage.removeItem('chipSongUrl'); }
      } catch(e){}
    }

    // postMessage do pai (gadget)
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'play' && e.data.url) {
        songUrl = e.data.url;
        ended = false;
        if (playerReady) startPlay();
      }
    });

    function stripExt(name) {
      return name.replace(/\.[^.]+$/, '');
    }

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls || '';
    }

    function fmtTime(ms) {
      if (!ms || ms < 0) return '0:00';
      var s = Math.floor(ms / 1000);
      var m = Math.floor(s / 60);
      s = s % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // Seek bar
    var seekTrack = document.getElementById('seek-track');
    var seekFill  = document.getElementById('seek-fill');
    var seekThumb = document.getElementById('seek-thumb');
    var timeCur   = document.getElementById('time-cur');
    var timeDur   = document.getElementById('time-dur');

    seekTrack.addEventListener('mousedown', startSeek);
    seekTrack.addEventListener('touchstart', startSeek, { passive: true });

    function startSeek(e) {
      seeking = true;
      doSeek(e);
      document.addEventListener('mousemove', doSeek);
      document.addEventListener('mouseup', endSeek);
      document.addEventListener('touchmove', doSeek);
      document.addEventListener('touchend', endSeek);
    }

    function doSeek(e) {
      if (!seeking) return;
      var touch = e.touches ? e.touches[0] : e;
      var rect = seekTrack.getBoundingClientRect();
      var pct = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
      seekFill.style.width = (pct * 100) + '%';
      seekThumb.style.left = (pct * 100) + '%';
      if (playerReady && window.ChipPlayer && window.ChipPlayer.sequencer) {
        try {
          var dur = window.ChipPlayer.sequencer.getDurationMs();
          if (dur > 0) window.ChipPlayer.sequencer.seekMs(Math.floor(pct * dur));
        } catch(ex){}
      }
    }

    function endSeek() {
      seeking = false;
      document.removeEventListener('mousemove', doSeek);
      document.removeEventListener('mouseup', endSeek);
      document.removeEventListener('touchmove', doSeek);
      document.removeEventListener('touchend', endSeek);
    }

    // Atualiza seek bar enquanto toca
    function startWatcher() {
      if (watchTimer) clearInterval(watchTimer);
      ended = false;
      watchTimer = setInterval(function() {
        if (!playerReady || !window.ChipPlayer || !window.ChipPlayer.sequencer) return;
        try {
          var seq = window.ChipPlayer.sequencer;
          var pos = seq.getPositionMs();
          var dur = seq.getDurationMs();
          if (dur > 0) {
            var pct = Math.min(1, pos / dur);
            if (!seeking) {
              seekFill.style.width = (pct * 100) + '%';
              seekThumb.style.left = (pct * 100) + '%';
              timeCur.textContent = fmtTime(pos);
              timeDur.textContent = fmtTime(dur);
            }
            // Detecta fim da música
            if (!ended && pct >= 0.995 && dur > 5000) {
              ended = true;
              if (watchTimer) clearInterval(watchTimer);
              setTimeout(function() {
                window.parent.postMessage({ type: 'songEnded' }, '*');
              }, 600);
            }
          }
        } catch(ex){}
      }, 500);
    }

    function startPlay() {
      if (!songUrl) return;
      var name = stripExt(decodeURIComponent(songUrl.split('/').pop()));
      setStatus('Tocando: ' + name, 'playing');
      ended = false;
      try {
        window.ChipPlayer.sequencer.playSonglist([songUrl]);
        startWatcher();
        // Reset seek bar
        seekFill.style.width = '0%';
        seekThumb.style.left = '0%';
        timeCur.textContent = '0:00';
        timeDur.textContent = '0:00';
      } catch(ex) {
        setStatus('Erro: ' + ex.message, 'error');
      }
    }

    function tryPlay() {
      if (!playerReady || !songUrl) return;
      startPlay();
    }

    // Carrega bundle
    if ('serviceWorker' in navigator) {
      var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
      navigator.serviceWorker.register(swPath).then(function(reg) {
        if (reg.installing) {
          reg.installing.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else if (reg.waiting) {
          reg.waiting.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else {
          loadBundle();
        }
      }).catch(function() { loadBundle(); });
    } else {
      loadBundle();
    }

    function loadBundle() {
      var s = document.createElement('script');
      var base = location.pathname.replace(/\/[^/]*$/, '');
      s.src = base + '/static/js/main.0a47.js';
      s.onload = function() {
        var tries = 0;
        var iv = setInterval(function() {
          tries++;
          if (window.ChipPlayer && window.ChipPlayer.sequencer) {
            clearInterval(iv);
            playerReady = true;
            if (window.parent !== window) {
              window.parent.postMessage({ type: 'ready' }, '*');
            }
            if (songUrl) startPlay();
            else setStatus('Pronto.', '');
          } else if (tries > 100) {
            clearInterval(iv);
            setStatus('Timeout: sequencer não inicializou.', 'error');
          }
        }, 300);
      };
      s.onerror = function() { setStatus('Erro ao carregar bundle.', 'error'); };
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
