<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chiptune Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #070d07;
      font-family: monospace;
      overflow: hidden;
    }
    #status {
      font-size: 10px;
      color: #2a5a2a;
      padding: 4px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.5px;
      height: 22px;
    }
    #status.playing { color: #39ff14; }
    #status.error   { color: #ff4444; }
    #root { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status">Inicializando...</div>

  <script>
    var songUrl     = null;
    var playerReady = false;
    var paused      = false;
    var posTimer    = null;

    // Lê ?url=
    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
      songUrl = decodeURIComponent(params.get('url'));
      try { sessionStorage.setItem('chipSongUrl', songUrl); } catch(e){}
    } else {
      try {
        var saved = sessionStorage.getItem('chipSongUrl');
        if (saved) { songUrl = saved; sessionStorage.removeItem('chipSongUrl'); }
      } catch(e){}
    }

    function stripExt(name) { return name.replace(/\.[^.]+$/, ''); }

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls || '';
    }

    function seq() {
      return window.ChipPlayer && window.ChipPlayer.sequencer;
    }

    // Tenta vários nomes de API (compatibilidade)
    function getPos() {
      var s = seq(); if (!s) return 0;
      try {
        if (typeof s.getPositionMs === 'function') return s.getPositionMs();
        if (typeof s.getPosition   === 'function') return s.getPosition() * 1000;
      } catch(e){}
      return 0;
    }

    function getDur() {
      var s = seq(); if (!s) return 0;
      try {
        if (typeof s.getDurationMs === 'function') return s.getDurationMs();
        if (typeof s.getDuration   === 'function') return s.getDuration() * 1000;
      } catch(e){}
      return 0;
    }

    function doSeek(ms) {
      var s = seq(); if (!s) return;
      try {
        if (typeof s.seekMs  === 'function') { s.seekMs(ms); return; }
        if (typeof s.seek    === 'function') { s.seek(ms / 1000); return; }
      } catch(e){}
    }

    function doPause() {
      var s = seq(); if (!s) return;
      try {
        if (typeof s.pause       === 'function') s.pause();
        else if (typeof s.togglePause === 'function') s.togglePause();
      } catch(e){}
    }

    function doResume() {
      var s = seq(); if (!s) return;
      try {
        if (typeof s.resume      === 'function') s.resume();
        else if (typeof s.togglePause === 'function') s.togglePause();
        else if (typeof s.play   === 'function') s.play();
      } catch(e){}
    }

    // Recebe comandos do gadget
    window.addEventListener('message', function(e) {
      if (!e.data) return;
      var d = e.data;

      if (d.type === 'play' && d.url) {
        songUrl = d.url;
        paused = false;
        if (playerReady) startPlay();
      }
      if (d.type === 'pause') {
        paused = true; doPause();
        setStatus('Pausado', '');
      }
      if (d.type === 'resume') {
        paused = false; doResume();
        setStatus('Tocando...', 'playing');
      }
      if (d.type === 'seek' && typeof d.ms === 'number') {
        doSeek(d.ms);
      }
      if (d.type === 'getPosition') {
        var pos = getPos(), dur = getDur();
        try {
          window.parent.postMessage({ type: 'position', pos: pos, dur: dur }, '*');
        } catch(ex){}
      }
    });

    // Polling de posição + detecção de fim
    var lastPos = -1;
    var endedSent = false;

    function startPoller() {
      if (posTimer) clearInterval(posTimer);
      endedSent = false; lastPos = -1;
      posTimer = setInterval(function() {
        if (paused || !playerReady) return;
        var pos = getPos(), dur = getDur();
        // Envia posição pro gadget
        try {
          window.parent.postMessage({ type: 'position', pos: pos, dur: dur }, '*');
        } catch(ex){}
        // Detecta fim: posição parou de avançar perto do fim
        if (dur > 3000 && pos > 0) {
          if (pos === lastPos && pos > dur * 0.9 && !endedSent) {
            endedSent = true;
            setTimeout(function() {
              try { window.parent.postMessage({ type: 'songEnded' }, '*'); } catch(ex){}
            }, 800);
          }
          // Segunda estratégia: percentual
          if (!endedSent && pos >= dur - 600 && dur > 3000) {
            endedSent = true;
            setTimeout(function() {
              try { window.parent.postMessage({ type: 'songEnded' }, '*'); } catch(ex){}
            }, 800);
          }
        }
        lastPos = pos;
      }, 500);
    }

    function startPlay() {
      if (!songUrl || !seq()) return;
      var name = stripExt(decodeURIComponent(songUrl.split('/').pop()));
      setStatus('♪ ' + name, 'playing');
      paused = false; endedSent = false;
      try {
        seq().playSonglist([songUrl]);
        startPoller();
      } catch(ex) {
        setStatus('Erro: ' + ex.message, 'error');
      }
    }

    // SW + bundle
    if ('serviceWorker' in navigator) {
      var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
      navigator.serviceWorker.register(swPath).then(function(reg) {
        if (reg.installing) {
          reg.installing.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else if (reg.waiting) {
          reg.waiting.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else {
          loadBundle();
        }
      }).catch(function() { loadBundle(); });
    } else {
      loadBundle();
    }

    function loadBundle() {
      var s = document.createElement('script');
      var base = location.pathname.replace(/\/[^/]*$/, '');
      s.src = base + '/static/js/main.0a47.js';
      s.onload = function() {
        var tries = 0;
        var iv = setInterval(function() {
          tries++;
          if (seq()) {
            clearInterval(iv);
            playerReady = true;
            try { window.parent.postMessage({ type: 'ready' }, '*'); } catch(ex){}
            if (songUrl) startPlay();
            else setStatus('Pronto.', '');
          } else if (tries > 100) {
            clearInterval(iv);
            setStatus('Timeout.', 'error');
          }
        }, 300);
      };
      s.onerror = function() { setStatus('Erro bundle.', 'error'); };
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
