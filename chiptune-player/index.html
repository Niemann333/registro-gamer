<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chiptune Player</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#070d07; overflow:hidden; }
    #status {
      font-family:monospace; font-size:10px; color:#2a5a2a;
      padding:4px 8px; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; height:22px; line-height:14px;
    }
    #status.playing { color:#39ff14; }
    #status.error   { color:#ff4444; }
    #root { display:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="status">Inicializando...</div>
  <script>
    var _ctx       = null;
    var _analyser  = null;
    var _linked    = false;
    var _scp       = null;   // ScriptProcessorNode do chip-player-js
    var _scpFading = false;
    var _ctxStart  = 0;
    var _silCount  = 0;
    var _endedSent = false;
    var _posTimer  = null;

    // ── 1. Captura o ScriptProcessorNode que o chip usa para gerar áudio ──
    // Permite aplicar fade diretamente nos samples de saída
    var _OrigCSP = AudioContext.prototype.createScriptProcessor
                || AudioContext.prototype.createJavaScriptNode;
    if (_OrigCSP) {
      AudioContext.prototype.createScriptProcessor =
      AudioContext.prototype.createJavaScriptNode = function() {
        var node = _OrigCSP.apply(this, arguments);
        _scp = node; // guarda referência
        return node;
      };
    }

    // ── 2. Captura AudioContext e AnalyserNode para detecção de silêncio ──
    var _origConn = AudioNode.prototype.connect;
    var _OrigAC   = window.AudioContext || window.webkitAudioContext;
    if (_OrigAC) {
      var _Wrap = function() {
        _ctx = new _OrigAC();
        try {
          _analyser = _ctx.createAnalyser();
          _analyser.fftSize = 2048;
          var _oc = AudioNode.prototype.connect;
          AudioNode.prototype.connect = function(dest, a, b) {
            if (_ctx && dest === _ctx.destination) {
              if (!_linked) { _linked = true; _oc.call(_analyser, _ctx.destination); }
              return _oc.call(this, _analyser, a, b);
            }
            return _oc.apply(this, arguments);
          };
        } catch(e) {}
        return _ctx;
      };
      _Wrap.prototype = _OrigAC.prototype;
      window.AudioContext = window.webkitAudioContext = _Wrap;
    }

    // ── 3. Fade: sobrescreve onaudioprocess para reduzir samples gradualmente ──
    function doFadeOut() {
      if (!_scp || _scpFading) return;
      _scpFading = true;

      var origHandler = _scp.onaudioprocess; // handler do chip-player-js
      var sampleRate  = _ctx ? _ctx.sampleRate : 44100;
      var fadeSamples = sampleRate * 3;  // 3 segundos de fade
      var samplesElapsed = 0;

      _scp.onaudioprocess = function(e) {
        // Chip gera áudio normalmente
        if (origHandler) origHandler.call(_scp, e);

        // Aplica ganho decrescente nos samples de saída
        samplesElapsed += e.outputBuffer.length;
        var gain = Math.max(0, 1.0 - samplesElapsed / fadeSamples);

        var ob = e.outputBuffer;
        for (var c = 0; c < ob.numberOfChannels; c++) {
          var d = ob.getChannelData(c);
          for (var i = 0; i < d.length; i++) {
            d[i] *= gain;
          }
        }
        // Quando gain chega a 0, o silence detector vai disparar songEnded
      };
    }

    // ── Detecção de silêncio via AnalyserNode ──
    function checkSilence() {
      if (!_analyser || !_ctx || _ctx.state !== 'running' || _endedSent) return;
      try {
        var buf = new Float32Array(_analyser.fftSize);
        _analyser.getFloatTimeDomainData(buf);
        var rms = 0;
        for (var i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
        rms = Math.sqrt(rms / buf.length);
        if (rms < 0.001) { _silCount++; } else { _silCount = 0; }
        if (_silCount >= 6) {
          _endedSent = true;
          try { window.parent.postMessage({ type: 'songEnded' }, '*'); } catch(e) {}
        }
      } catch(e) {}
    }

    var songUrl = null, playerReady = false;

    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) {
      songUrl = decodeURIComponent(params.get('url'));
      try { sessionStorage.setItem('chipSongUrl', songUrl); } catch(e) {}
    } else {
      try {
        var sv = sessionStorage.getItem('chipSongUrl');
        if (sv) { songUrl = sv; sessionStorage.removeItem('chipSongUrl'); }
      } catch(e) {}
    }

    function seq() { return window.ChipPlayer && window.ChipPlayer.sequencer; }
    function setStatus(m, c) { var el = document.getElementById('status'); el.textContent = m; el.className = c || ''; }

    function startPoller() {
      if (_posTimer) clearInterval(_posTimer);
      _ctxStart  = _ctx ? _ctx.currentTime : 0;
      _endedSent = false;
      _silCount  = 0;
      _scpFading = false;
      _posTimer  = setInterval(function() {
        if (!_ctx) return;
        var pos = Math.max(0, _ctx.currentTime - _ctxStart);
        try { window.parent.postMessage({ type: 'position', posSec: pos }, '*'); } catch(e) {}
        checkSilence();
      }, 300);
    }

    window.addEventListener('message', function(e) {
      if (!e.data) return;
      var d = e.data;
      if (d.type === 'play' && d.url) {
        songUrl = d.url; _endedSent = false; _scpFading = false;
        if (playerReady) startPlay();
      }
      if (d.type === 'pause') {
        try { if (_ctx && _ctx.state === 'running') _ctx.suspend(); } catch(e) {}
      }
      if (d.type === 'resume') {
        try { if (_ctx && _ctx.state === 'suspended') _ctx.resume(); } catch(e) {}
      }
      if (d.type === 'fadeout') {
        doFadeOut();
      }
    });

    function startPlay() {
      if (!songUrl || !seq()) return;
      try { if (_ctx && _ctx.state === 'suspended') _ctx.resume(); } catch(e) {}
      _endedSent = false; _silCount = 0; _scpFading = false;
      var n = songUrl.split('/').pop().replace(/\.[^.]+$/, '');
      try { n = decodeURIComponent(n); } catch(e) {}
      setStatus('\u266A ' + n, 'playing');
      try {
        seq().playSonglist([songUrl]);
        setTimeout(startPoller, 500);
      } catch(ex) { setStatus('Erro: ' + ex.message, 'error'); }
    }

    // SW + bundle
    if ('serviceWorker' in navigator) {
      var swPath = (location.pathname.replace(/\/[^/]*$/, '') || '') + '/sw.js';
      navigator.serviceWorker.register(swPath).then(function(reg) {
        if (reg.installing) {
          reg.installing.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else if (reg.waiting) {
          reg.waiting.addEventListener('statechange', function() {
            if (this.state === 'activated') location.reload();
          });
        } else { loadBundle(); }
      }).catch(loadBundle);
    } else { loadBundle(); }

    function loadBundle() {
      var s = document.createElement('script');
      s.src = (location.pathname.replace(/\/[^/]*$/, '')) + '/static/js/main.0a47.js';
      s.onload = function() {
        var tries = 0;
        var iv = setInterval(function() {
          tries++;
          if (seq()) {
            clearInterval(iv); playerReady = true;
            try { window.parent.postMessage({ type: 'ready' }, '*'); } catch(e) {}
            if (songUrl) startPlay(); else setStatus('Pronto.', '');
          } else if (tries > 100) {
            clearInterval(iv); setStatus('Timeout.', 'error');
          }
        }, 300);
      };
      s.onerror = function() { setStatus('Erro ao carregar bundle.', 'error'); };
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
